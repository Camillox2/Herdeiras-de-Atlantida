name: Ren'Py Lint

on:
  pull_request:
    branches: [main]
    paths:
      - "renpy/**"
      - ".github/workflows/renpy-lint.yml"
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Ren'Py SDK
        id: cache-renpy
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/renpy-8.5.3-sdk
          key: renpy-sdk-8.5.3-linux-v2

      - name: Download Ren'Py 8.5.3 SDK
        if: steps.cache-renpy.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          cd "${RUNNER_TEMP}"
          curl --fail --location --retry 3 \
            --output renpy-sdk.tar.bz2 \
            https://www.renpy.org/dl/release/renpy-8.5.3-sdk.tar.bz2
          mkdir -p renpy-8.5.3-sdk
          tar -xjf renpy-sdk.tar.bz2 --strip-components=1 -C renpy-8.5.3-sdk
          chmod +x renpy-8.5.3-sdk/renpy.sh

      - name: Run Ren'Py lint
        shell: bash
        run: |
          set +e
          "${RUNNER_TEMP}/renpy-8.5.3-sdk/renpy.sh" \
            "${GITHUB_WORKSPACE}/renpy" lint \
            "${GITHUB_WORKSPACE}/renpy-lint.txt" \
            --error-code
          status=$?
          echo "--- Ren'Py lint report ---"
          if [ -f "${GITHUB_WORKSPACE}/renpy-lint.txt" ]; then
            cat "${GITHUB_WORKSPACE}/renpy-lint.txt"
          else
            echo "Ren'Py did not produce a lint report."
          fi
          exit "$status"

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: renpy-lint-report
          path: renpy-lint.txt
          if-no-files-found: warn
